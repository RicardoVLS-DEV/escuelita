<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>Noticia Completa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .banner-noticia {
            max-height: 400px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="noticias.html" class="btn btn-outline-secondary mb-3">
            <i class="bi bi-arrow-left"></i> Volver a Noticias
        </a>
    </div>

    <div class="container mb-5">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div id="imagen-container"></div>
            
            <div class="card-body p-4 p-md-5">
                <h1 class="fw-bold display-5 mb-3" id="noticia-titulo">Cargando noticia...</h1>
                
                <div class="d-flex text-muted small mb-4 border-bottom pb-3">
                    <div class="me-4"><i class="bi bi-person-fill text-primary"></i> <span id="noticia-autor">---</span></div>
                    <div><i class="bi bi-calendar-event-fill text-success"></i> <span id="noticia-fecha">--/--/----</span></div>
                </div>

                <p class="lead text-secondary fw-semibold mb-4" id="noticia-resumen"></p>

                <div class="fs-5" style="line-height: 1.8; text-align: justify;" id="noticia-contenido">
                    </div>
            </div>
        </div>
    </div>

    <script src="../js/jquery-4.0.0.min.js"></script>
    <script id="script-detalle">
        $(document).ready(function () {
            // 1. Extraer el ID de la URL (?id=XX)
            const urlParams = new URLSearchParams(window.location.search);
            const idNoticia = urlParams.get('id');

            if (!idNoticia) {
                alert("No se especificó ninguna noticia.");
                window.location.href = "noticias.html";
                return;
            }

            // 2. Solicitar al Backend los detalles de esa noticia específica
            const API_NOTICIAS = "https://limousines-lawsuit-lecture-belt.trycloudflare.com/backend_demo/cordova.php";
            
            $.get(API_NOTICIAS + "?buscarNoticiaUnica=" + idNoticia, function (noticia) {
                if(noticia.error) {
                    alert(noticia.error);
                    window.location.href = "noticias.html";
                    return;
                }

                // 3. Pintar los datos en el HTML
                $("#noticia-titulo").text(noticia.titulo);
                $("#noticia-autor").text(noticia.autor);
                $("#noticia-fecha").text(noticia.fecha_publicacion);
                $("#noticia-resumen").text(noticia.resumen);
                $("#noticia-contenido").text(noticia.contenido);

                if (noticia.imagen) {
                    let urlImg = "https://limousines-lawsuit-lecture-belt.trycloudflare.com/backend_demo/uploads/" + noticia.imagen;
                    $("#imagen-container").html(`<img src="${urlImg}" class="banner-noticia" alt="Imagen Noticia">`);
                }
            }).fail(function() {
                alert("Error al conectar con el servidor.");
            });
        });
    </script>
</body>
</html>
